# Nixpacks Configuration for Laravel 11+ (PHP 8.4)
[phases.setup]
nixPkgs = ['php84', 'php84Extensions.bcmath', 'php84Extensions.gd', 'php84Extensions.intl', 'php84Extensions.mbstring', 'php84Extensions.mysqlnd', 'php84Extensions.opcache', 'php84Extensions.pdo', 'php84Extensions.xml', 'php84Extensions.zip']

[phases.install]
dependsOn = ['setup']
cmds = ['composer install --optimize-autoloader --no-interaction --no-progress']

[variables]
NIXPACKS_PHP_VERSION = '8.4'
