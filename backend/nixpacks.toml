# Nixpacks Configuration for Laravel 11+
[phases.setup]
nixPkgs = ['php83', 'php83Extensions.bcmath', 'php83Extensions.gd', 'php83Extensions.intl', 'php83Extensions.mbstring', 'php83Extensions.mysqlnd', 'php83Extensions.opcache', 'php83Extensions.pdo', 'php83Extensions.xml', 'php83Extensions.zip']

[phases.install]
dependsOn = ['setup']
cmds = ['composer install --optimize-autoloader --no-interaction --no-progress']

[variables]
NIXPACKS_PHP_VERSION = '8.3'
